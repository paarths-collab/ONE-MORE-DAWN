name: CI

on:
  push:
    branches: [main, 'build/**']
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Type-check, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The repo starts docs-first; skip gracefully until the app scaffold lands.
      - name: Check for app scaffold
        id: scaffold
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet — skipping validation."
          fi

      - uses: actions/setup-node@v4
        if: steps.scaffold.outputs.present == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.scaffold.outputs.present == 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Type-check
        if: steps.scaffold.outputs.present == 'true'
        run: npm run type-check

      - name: Lint
        if: steps.scaffold.outputs.present == 'true'
        run: npm run lint

      - name: Test
        if: steps.scaffold.outputs.present == 'true'
        run: |
          if node -e "process.exit(require('./package.json').scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script yet — skipping."
          fi

      - name: Build
        if: steps.scaffold.outputs.present == 'true'
        run: npm run build

  deploy:
    name: Upload to Devvit (main only)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DEVVIT_TOKEN: ${{ secrets.DEVVIT_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy prerequisites
        id: prereq
        run: |
          if [ -z "$DEVVIT_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "DEVVIT_TOKEN secret not configured — skipping deploy (validation still ran)."
          elif [ ! -f package.json ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No app scaffold yet — skipping deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.prereq.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.prereq.outputs.ready == 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Upload to Devvit
        if: steps.prereq.outputs.ready == 'true'
        run: npx devvit upload
